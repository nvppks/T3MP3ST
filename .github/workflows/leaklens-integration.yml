name: LeakLens integration

on:
  push:
    branches: ['agent/leaklens-burp-adapter']
    paths:
      - 'src/integrations/leaklens/**'
      - 'src/integrations/burp/server.ts'
      - 'src/__tests__/leaklens-integration.test.ts'
      - 'integrations/leaklens-burp/**'
      - '.github/workflows/leaklens-integration.yml'
  pull_request:
    paths:
      - 'src/integrations/leaklens/**'
      - 'src/integrations/burp/server.ts'
      - 'src/__tests__/leaklens-integration.test.ts'
      - 'integrations/leaklens-burp/**'

permissions:
  contents: read

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run src/__tests__/leaklens-integration.test.ts

  burp-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Compile extension
        id: compile
        shell: bash
        run: |
          set +e
          gradle --console=plain -q -p integrations/leaklens-burp jar > gradle.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: leaklens-gradle-log
          path: gradle.log
      - name: Verify compilation
        run: |
          cat gradle.log
          test "${{ steps.compile.outputs.status }}" = "0"
